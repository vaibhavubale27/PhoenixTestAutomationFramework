name: Phoenix Test Automation Workflow

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  run-tests:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Executing Test Automation Frameworks
      run: mvn clean test -DsuiteXmlFile=testng.xml -Denv=qa

    - name: Upload A Build Artifact
      if: always()
      uses: actions/upload-artifact@v3.2.2
      with:
        name: Surefire Reports
        path: target/surefire-reports/
        retention-days: 30
      
     
     
      
