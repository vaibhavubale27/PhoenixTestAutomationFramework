name: Phoenix Test Automation Workflow

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule: #set the cron for midnight IST
    - cron: "30 18 * * *"
    - cron: "30 17 * * *"
    - cron: "30 16 * * *"
  workflow_dispatch: 
    inputs:
      env:
        description: "Enviroment"
        type: choice
        options: [dev,qa,uat]
        default: qa
        required: true
        
      suiteXmlFile:
        description: "TestNg XML File"
        type: choice
        options: [testng.xml,smoke.xml,regression.xml]
        default: qa
        required: true
        

jobs:
  run-tests:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Executing Test Automation Framework
      run: mvn clean test -DsuiteXmlFile="${{ github.event.inputs.suiteXmlFile }}" -Denv="${{ github.event.inputs.env }}"

    - name: Upload A Build Artifact
      if: always()
      uses: actions/upload-artifact@v7.0.0
      with:
        name: Surefire Reports
        path: target/surefire-reports/
        retention-days: 30
      
     
     
      
